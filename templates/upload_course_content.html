{% extends "teacher_base.html" %}
{% block title %}
Goonj | Upload Content
{% endblock title %}
{% block content %}
<div class="container my-5">
    <h2 class="text-secondary text-uppercase text-center fw-bold mt-5 mb-4">Upload Course Content</h2>

    <div class="card shadow-lg border-0">
        <div class="card-body p-4">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <!-- Content Title -->
                <div class="form-group mb-3">
                    <label for="title" class="form-label fw-bold">Content Title</label>
                    <input type="text" name="title" class="form-control rounded-pill" id="title"
                        placeholder="Enter content title" required>
                </div>

                <!-- Description Field (Rich Text Editor) -->
                <div class="form-group mb-3">
                    <label for="description" class="form-label fw-bold">Description</label>
                    <textarea name="description" class="form-control rounded-pill" id="description" rows="5"></textarea>
                </div>

                <!-- Content File Section -->
                <h3 class="text-primary mt-4 mb-3">Content File</h3>

                <!-- File Title -->
                <div class="form-group mb-3">
                    <label for="file_title" class="form-label fw-bold">File Title</label>
                    <input type="text" name="file_title" class="form-control rounded-pill" id="file_title"
                        placeholder="Enter file title" required>
                </div>

                <!-- File Type -->
                <div class="form-group mb-3">
                    <label for="file_type" class="form-label fw-bold">File Type</label>
                    <select name="file_type" class="form-select rounded-pill" id="file_type" required>
                        <option value="pdf">PDF</option>
                        <option value="video">Video</option>
                    </select>
                </div>

                <!-- File Upload -->
                <div class="form-group mb-4">
                    <label for="file" class="form-label fw-bold">Upload File</label>
                    <input type="file" name="file" class="form-control rounded-pill" id="file" required>
                </div>

                <!-- Submit Button -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary rounded-pill">Upload Content</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- CKEditor Script -->
<script src="https://cdn.ckeditor.com/ckeditor5/36.0.1/classic/ckeditor.js"></script>
<script>
    ClassicEditor
        .create(document.querySelector('#description'))
        .catch(error => {
            console.error(error);
        });
</script>

<style>
    body {
        font-family: 'Poppins', sans-serif;
        background-color: #f8f9fa;
    }

    h2 {
        font-size: 2rem;
        letter-spacing: 1px;
    }

    .card {
        max-width: 600px;
        margin: 0 auto;
        border-radius: 20px;
    }

    .form-label {
        font-size: 1rem;
        color: #555;
    }

    .form-control,
    .form-select {
        padding: 10px 15px;
        font-size: 0.95rem;
    }

    .form-control::placeholder {
        font-style: italic;
        color: #bbb;
    }

    .btn-primary {
        background-color: #007bff;
        border: none;
        padding: 12px;
        font-size: 1rem;
    }

    .btn-primary:hover {
        background-color: #0056b3;
    }

    .text-primary {
        font-size: 1.2rem;
        font-weight: bold;
    }
</style>
{% endblock %}
