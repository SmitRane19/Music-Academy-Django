{% extends base_template %}
{% load static %}

{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <h2 class="text-center mb-4 text-primary fw-bold">Edit Profile</h2>
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 p-4 rounded-4">
                <h4 class="text-center text-secondary mb-4">Update Your Information</h4>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <!-- First Name -->
                    <div class="mb-3">
                        <label for="first_name" class="form-label text-secondary fw-semibold">First Name</label>
                        <input type="text" class="form-control form-control-lg rounded-pill" id="first_name" name="first_name"
                            value="{{ form.first_name.value }}" placeholder="Enter your first name" required>
                    </div>

                    <!-- Last Name -->
                    <div class="mb-3">
                        <label for="last_name" class="form-label text-secondary fw-semibold">Last Name</label>
                        <input type="text" class="form-control form-control-lg rounded-pill" id="last_name" name="last_name"
                            value="{{ form.last_name.value }}" placeholder="Enter your last name" required>
                    </div>

                    <!-- Date of Birth -->
                    <div class="mb-3">
                        <label for="dob" class="form-label text-secondary fw-semibold">Date of Birth</label>
                        <input type="date" class="form-control form-control-lg rounded-pill" id="dob" name="dob"
                            value="{{ form.dob.value|date:'Y-m-d' }}" required>
                    </div>

                    <!-- Gender -->
                    <div class="mb-3">
                        <label for="gender" class="form-label text-secondary fw-semibold">Gender</label>
                        <select class="form-select form-select-lg rounded-pill" id="gender" name="gender" required>
                            {% for choice, display in form.gender.field.choices %}
                                <option value="{{ choice }}" {% if form.gender.value == choice %}selected{% endif %}>
                                    {{ display }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Contact Number -->
                    <div class="mb-3">
                        <label for="contact" class="form-label text-secondary fw-semibold">Contact Number</label>
                        <input type="text" class="form-control form-control-lg rounded-pill" id="contact" name="contact"
                            value="{{ form.contact.value }}" placeholder="Enter your contact number" required>
                    </div>

                    <!-- Profile Picture -->
                    <div class="mb-3">
                        <label for="profile_picture" class="form-label text-secondary fw-semibold">Profile Picture</label>
                        <div class="text-center mb-3">
                            <!-- Existing Image Preview -->
                            {% if user.profile_picture %}
                                <img id="profilePreview" src="{{ user.profile_picture.url }}" alt="Profile Picture"
                                    class="rounded-circle" width="150" height="150">
                            {% else %}
                                <img id="profilePreview" src="{% static 'images/default-profile.png' %}" 
                                    alt="Default Profile Picture" class="rounded-circle" width="150" height="150">
                            {% endif %}
                        </div>
                        <input type="file" class="form-control form-control-lg rounded-pill" id="profile_picture"
                            name="profile_picture" accept="image/*" onchange="previewImage(event)">
                    </div>

                    <!-- Submit Button -->
                    <div class="text-center">
                        <button type="submit" class="btn btn-success btn-lg px-5 rounded-pill">
                            Save Changes <i class="fa-solid fa-floppy-disk ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    body {
        background-color: #f4f8fb;
    }

    .card {
        background-color: #ffffff;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    h2 {
        font-size: 2.5rem;
        font-weight: 700;
    }

    label {
        font-size: 1rem;
    }

    .btn-success {
        background-color: #28a745;
        border-color: #28a745;
        font-weight: bold;
        transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .btn-success:hover {
        background-color: #218838;
        transform: scale(1.05);
    }
</style>

<script>
    function previewImage(event) {
        const input = event.target;
        const reader = new FileReader();
        reader.onload = function () {
            const preview = document.getElementById('profilePreview');
            preview.src = reader.result;
        };
        reader.readAsDataURL(input.files[0]);
    }
</script>
{% endblock %}
